services:
  backend:
    image: ownbuild:v1.2 #httpx
    container_name: app2-backend2
    hostname: app2-backend2

    volumes:
      - /home/alex/app2/backend:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - PYTHONUNBUFFERED=1
      - S3_ENDPOINT=http://app2-minio2:9000
      - S3_ACCESS_KEY=${minio_root_user}
      - S3_SECRET_KEY=${minio_root_password}
      - S3_BUCKET=bucket1
      - PUBLIC_SERVER_IP=${public_server_ip}
      - NEXT_NEIGHBOR_API=${NEXT_NEIGHBOR_API} #httpx

      - DATABASE_URL=postgresql://${postgres_user}:${postgres_password}@app2-postgres2:5432/${postgres_db}
    
    ports:
      - "8000:8000"
    networks:
      - testnet

networks:
  testnet:
    name: test_network
    external: true